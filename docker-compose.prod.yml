# Production stack for self-hosting (an alternative to the managed-platform
# path in DEPLOYMENT.md — Vercel/Railway/Render/Neon don't use this file at
# all). Builds optimized images, no bind mounts, restart policies, and a
# persistent named volume for Postgres data.
#
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml run --rm migrate
#   docker compose -f docker-compose.prod.yml up -d
#
# Frontend build-time API URLs are read from the shell/root .env at build
# time (Vite bakes VITE_* vars into the static bundle — see each app's
# Dockerfile) — export them or put them in a root-level `.env` before
# building:
#   VITE_API_URL=https://api.example.com/api/v1
#   ADMIN_VITE_API_URL=https://api.example.com/api/v1

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-av1_company}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Not exposed to the host — only reachable by other containers on this
    # network. Remove this comment and add a `ports:` mapping if you need
    # direct external access (e.g. a GUI client) on a self-hosted box.

  migrate:
    build:
      context: ./server
      target: migrator
    env_file:
      - ./server/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]
    # Not part of `docker compose up` — run explicitly before (re)starting
    # `server` whenever the schema has changed:
    #   docker compose -f docker-compose.prod.yml run --rm migrate

  server:
    build:
      context: ./server
      target: production
    env_file:
      - ./server/.env.production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  av1-company:
    build:
      context: ./av1-company
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.example.com/api/v1}
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      target: production
      args:
        VITE_API_URL: ${ADMIN_VITE_API_URL:-https://api.example.com/api/v1}
    ports:
      - "8081:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:

# Optional single-entrypoint reverse proxy for self-hosting the full stack
# (public site + admin dashboard + API) behind one nginx instance on one
# machine, routed by subdomain so neither frontend needs any code changes.
#
# Not used by docker-compose.yml / docker-compose.prod.yml by default — those
# expose each service's own port directly, which is simpler for local/single-
# host use. Wire this in (as its own compose service, ports 80/443, depending
# on the other three) if you're self-hosting behind a single public IP and
# want one nginx to terminate everything.
#
# Requires DNS (or /etc/hosts for local testing) pointing:
#   example.com        → this host   (public site)
#   admin.example.com   → this host   (admin dashboard)
#   api.example.com      → this host   (backend API)

gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_proxied any;
gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/ttf font/otf font/woff font/woff2;

map $sent_http_content_type $expires_static {
    default off;
    "~image/"  1y;
    "~font/"    1y;
    "~javascript" 1y;
    "~text/css"    1y;
}

# ── Public marketing site ────────────────────────────────────────────
server {
    listen 80;
    server_name example.com www.example.com;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://av1-company:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires $expires_static;
    }
}

# ── Admin dashboard (never indexed) ──────────────────────────────────
server {
    listen 80;
    server_name admin.example.com;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires $expires_static;
    }
}

# ── Backend API ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.example.com;

    location / {
        proxy_pass http://server:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The API sets its own security/CORS headers (helmet + cors
        # middleware) — nginx here only needs to forward, not duplicate them.
    }
}

# Development stack: hot-reload for all three apps + a local Postgres with a
# persistent volume. `docker compose up` and everything is live-reloading.
#
#   docker compose up
#   docker compose exec server npx prisma migrate dev
#   docker compose exec server npm run seed
#
# Then: site → http://localhost:5173, admin → http://localhost:3000,
# api → http://localhost:4000.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: av1_company
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: ./server
      target: dev
    env_file:
      - ./server/.env
    environment:
      # Overrides .env's DATABASE_URL — inside the Docker network the DB is
      # reachable at the service name "postgres", not "localhost".
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/av1_company?schema=public
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  av1-company:
    build:
      context: ./av1-company
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./av1-company:/app
      - av1_company_node_modules:/app/node_modules

  admin:
    build:
      context: ./admin
      target: dev
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    depends_on:
      - server

volumes:
  postgres_data:
  server_node_modules:
  av1_company_node_modules:
  admin_node_modules:

<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2a5736" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1d1f" media="(prefers-color-scheme: dark)" />

    <!-- Google Search Console: paste the verification meta tag Search Console
         gives you here once the site is live and verified. Left out until then. -->
    <!-- <meta name="google-site-verification" content="REPLACE_WITH_REAL_TOKEN" /> -->
    <!--
      The tags below are pre-hydration fallbacks only — every route renders its own
      <PageMeta> (React 19 hoists <title>/<meta> into <head>, and PageMeta always
      emits its own robots directive), and main.tsx removes these data-default tags
      as soon as React mounts so there's never a duplicate.
    -->
    <meta name="robots" content="index, follow" data-default />
    <meta
      name="description"
      content="AV1-Company - Transforming Outdoor Spaces Into Timeless Beauty. Peizazhe dhe dizajn i jashtëm premium."
      data-default
    />
    <title data-default>AV1-Company | Transforming Outdoor Spaces Into Timeless Beauty</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

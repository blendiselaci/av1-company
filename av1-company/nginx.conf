# Production nginx config for the av1-company static SPA build.
# Compression, long-lived caching on hashed assets, security headers, and
# SPA fallback routing (unknown paths serve index.html so React Router can
# handle them client-side).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ── Security headers ─────────────────────────────────────────────
    # Helmet already covers the API; these apply the equivalent to the
    # static site served from here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "0" always;

    # ── Caching ───────────────────────────────────────────────────────
    # Vite fingerprints every built asset filename with a content hash, so
    # these are safe to cache forever — a new deploy always ships new
    # filenames, never mutates an existing one.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.svg {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # index.html itself must always be revalidated — it's the one file that
    # changes on every deploy and points at the current hashed asset names.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # ── SPA routing ───────────────────────────────────────────────────
    # Any path that isn't a real file falls through to index.html so
    # React Router owns client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Don't serve dotfiles (e.g. a stray .env if one ever ended up in dist/).
    location ~ /\. {
        deny all;
    }
}
